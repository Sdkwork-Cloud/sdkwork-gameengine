version: 1
defaultProfile: cloud.production

profiles:
  cloud.production:
    install:
      layout: binary-package
    expose:
      - domain: games.sdkwork.com
        tls: sdkwork.com
        mode: web
        web: pc
      - domain: gameengine.sdkwork.com
        tls: sdkwork.com
        mode: api
      - domain: api.sdkwork.com
        tls: sdkwork.com
        mode: api
    packages: []
    overrides:
      proxy:
        upstreams:
          application.public-ingress: https://gameengine.sdkwork.com
          platform.api-gateway: https://api.sdkwork.com

  standalone.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: web+api
        web: pc
    packages: []
    overrides:
      allowInsecureTls: true
