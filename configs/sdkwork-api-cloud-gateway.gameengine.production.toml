mode = "embedded"

[service]
name = "sdkwork-api-cloud-gateway"
environment = "production"

[server]
bind = "0.0.0.0:3900"

[[dependencySurfaces]]
serviceId = "sdkwork-gameengine-app-api"
workspace = "sdkwork-gameengine"
sdkFamily = "sdkwork-gameengine-app-sdk"
apiAuthority = "sdkwork-gameengine-app-api"
surface = "app"
apiPrefix = "/app/v3/api"
runtimeMode = "split"
sameOriginAllowed = false
requiredBaseUrlKey = "SDKWORK_GAMES_APPLICATION_PUBLIC_HTTP_URL"
coverage = "gameengine-app-api-upstream-routes"

[[upstreams]]
serviceId = "sdkwork-gameengine-app-api"
baseUrl = "https://gameengine.sdkwork.com"

[cors]
allowAnyOrigin = false
allowedOrigins = ["https://games.sdkwork.com"]

[request]
maxBodyBytes = 33554432
timeoutMs = 30000

[readiness]
checkUpstreams = true
timeoutMs = 3000

[observability]
accessLogEnabled = true
auditLogEnabled = true
accessLogSampleRateBasisPoints = 10000
auditLogSampleRateBasisPoints = 10000
metricsEnabled = true
metricsPath = "/metrics"
tracingEnabled = true
redactHeaders = ["authorization", "access-token", "cookie", "x-api-key", "set-cookie"]

[diagnostics]
enabled = false
path = "/internal/gateway/diagnostics"
includePolicyInventory = true
includeRouteInventory = true

[security]
allowedHosts = ["api.sdkwork.com"]
trustedProxyCidrs = []
secureHeadersEnabled = true
maxHeaderBytes = 65536
maxHeaderCount = 128
rejectCredentialHeadersOnAnonymousAuthRoutes = true
csrfGuardEnabled = false

[security.waf]
enabled = true
mode = "block"
inspectQuery = true
inspectHeaders = true
inspectJsonBody = true

[traffic]
rateLimitEnabled = true
compatXRateLimitHeaders = true
globalMaxInFlight = 1024
rateLimits = []
concurrencyLimits = []

[policy]
enabled = true
dryRun = false
rules = []

[resilience]
retryEnabled = false
maxAttempts = 1
retryStatuses = [502, 503, 504]
retryBackoffMs = 0
circuitBreakerEnabled = true
failureThreshold = 5
openSeconds = 30
halfOpenMaxAttempts = 1
